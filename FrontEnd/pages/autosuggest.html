<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position:fixed;
            top:20px;
            left:20px;
        }
        .right-bar{
            position:fixed;
            top:20px;
            right:20px;
        }
        .search-section{
            text-align:center;
            margin-top: 200px;
        }
        .logo-first{
            color:red;
        }
        .logo-last{
            color:blue;
        }
        .text-color{
            color:gray;
        }
        .lens{
            position:relative;
            left:40px;
        }
        .search-box{
            padding:15px 15px 15px 45px;
            background-color:lightblue;
            border-radius:30px;
            width:42%;
        }
        #suggestion-box{
            border: 1px solid black;
            width:45%;
            margin-left:28.8%;
        }
    </style>
</head>
<body>
    <div>
    <span class="left-bar">&#9881;</span>
    <span class="right-bar">&#x2022;online|&#x1F552; -ms</span>
    </div>
    <div class="search-section">
    <h1><span class="logo-first">Being</span><span class="logo-last">Infinity</span></h1>
    <p class="text-color">One million phrases.Four algorithms.Prefix Based Auto Suggest</p>
    <span>
        <span class="lens">&#128269;</span>
        <input class="search-box" id="search-box" placeholder="Start Typing To Search">
    </span>
    <div id="suggestion-box">
        Suggestions
    </div>
    </div>
    <script>
        var searchBox = document.getElementById("search-box");
        var suggestionBox = document.getElementById("suggestion-box");
        searchBox.addEventListener("input", function () {
        var userInput = searchBox.value;
        if (userInput.trim() == "") {
        suggestionBox.innerHTML = "";
        return;
       }
       var url1 ="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
       var url3="&algorithm=brute&limit=10&weighted=false";
       var url=url1+userInput+url3;
       fetch(url)
        .then(function (response) {
            return response.json();
        })
        .then(function (data) {
            console.log(data);
            var resultArray = data.results;
            var htmlResults = "";
            for (var i = 0; i < resultArray.length; i++) {
                htmlResults +="<div class='suggestion-item'>" +resultArray[i].text +"</div>";
            }
            suggestionBox.innerHTML = htmlResults;
        });
    });
    </script>
</body>
</html>
